<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Fraud Checker</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>💳 Credit Card Fraud Detector</h1>
        <p>Enter transaction details below and click <strong>Predict</strong>!</p>
        {% if result %}
            <div class="result {{ 'fraud' if result=='Fraudulent' else 'legit' }}">
                Prediction: <strong>{{ result }}</strong><br>
                Probability (fraud): {{ '{:.2f}'.format(probability) }}
            </div>
        {% endif %}
        {% if error %}
            <div class="error">Error: {{ error }}</div>
        {% endif %}
        <form action="/predict" method="post">
            <div class="grid">
                {% for feat in features %}
                <div class="cell">
                    <label for="{{feat}}">{{feat}}</label>
                    <input type="text" name="{{feat}}" id="{{feat}}" required>
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn">Predict</button>
            <button type="button" class="btn secondary" onclick="loadExample()">Load Example</button>
        </form>
    </div>
</body>
</html>
